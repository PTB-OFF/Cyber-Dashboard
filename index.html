<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber SOC Dashboard</title>
  <link rel="CSS/stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🛡️ SOC Dashboard</h1>
  <div id="stats">
    <span id="total"></span>
    <span id="high"></span>
  </div>
</header>

<div id="filters">
  <button onclick="filterSeverity('ALL')">ALL</button>
  <button onclick="filterSeverity('HIGH')">HIGH</button>
  <button onclick="filterSeverity('MEDIUM')">MEDIUM</button>
  <button onclick="filterSeverity('LOW')">LOW</button>
</div>

<div id="news-container"></div>

<script src="JS/script.js"></script>
</body>
</html>
