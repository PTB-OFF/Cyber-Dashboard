name: Update JSON daily

on:
  schedule:
    - cron: '0 8 * * *'  # Tous les jours à 08:00 UTC
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser

      - name: Run Python script
        run: python Python/fetch_news.py

      - name: Commit JSON
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add JSON/data.json
          git commit -m "Update JSON" || echo "No changes to commit"
          git push || echo "Push failed, maybe no changes"
