name: Daily JSON Update

on:
  schedule:
    - cron: '0 8 * * *'  # Tous les jours à 08:00 UTC
  workflow_dispatch:      # Permet un run manuel

jobs:
  update-json:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser

      - name: Run fetch_news script
        run: python Python/fetch_news.py

      - name: Commit updated JSON if changes exist
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add JSON/data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update news JSON"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
