name: Daily JSON Update

on:
  schedule:
    - cron: '0 6 * * *'  # Verif ete/hiver pour 08:00 Paris
    - cron: '0 7 * * *'  # Verif ete/hiver pour 08:00 Paris
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser

      - name: Run fetch_news script
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$(TZ=Europe/Paris date +%H)" != "08" ]; then
            echo "Not 08:00 in Europe/Paris, skipping."
            exit 0
          fi
          python Python/fetch_news.py

      - name: Commit and push updated JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update daily cyber news data"
          file_pattern: JSON/data.json
